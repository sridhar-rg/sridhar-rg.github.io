<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" role="img" aria-labelledby="cycleTitle cycleDesc">
  <title id="cycleTitle">The design-build-test-learn cycle for pooled guide RNA panels</title>
  <desc id="cycleDesc">A five-stage closed loop: Design a candidate guide pool, Build it in pooled depletion reactions, Analyze sequencing counts into efficacy and off-target labels, Learn a shared-representation multi-task model that scores every guide, and Select a minimal panel via greedy submodular cover, which then feeds the next round of Design. The Learn and Select stages are highlighted as the two this blog post covers in technical depth.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0B0F17" />
      <stop offset="100%" stop-color="#151D2A" />
    </linearGradient>
    <radialGradient id="focusGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.16" />
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0" />
    </radialGradient>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B7686" />
    </marker>
    <marker id="arrowHeadAccent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#34D399" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="800" rx="24" fill="url(#bg)" />

  <!-- ================= focus zone behind Learn + Select ================= -->
  <ellipse cx="205" cy="485" rx="270" ry="230" fill="url(#focusGlow)" />

  <!-- ================= loop arrows (drawn first, under the nodes) ================= -->
  <g fill="none" stroke="#6B7686" stroke-width="2.5" marker-end="url(#arrowHead)">
    <!-- Design -> Build -->
    <path d="M 605,152 C 680,180 730,220 762,278" />
    <!-- Build -> Analyze -->
    <path d="M 792,380 C 780,460 770,530 748,598" />
    <!-- Analyze -> Learn (accent: entering focus zone) -->
    <path d="M 660,635 C 590,670 500,678 415,662" stroke="#34D399" marker-end="url(#arrowHeadAccent)" />
  </g>
  <!-- Learn -> Select (inside focus zone, accent) -->
  <path d="M 178,598 C 132,535 128,455 148,380" fill="none" stroke="#34D399" stroke-width="2.5" marker-end="url(#arrowHeadAccent)" />
  <!-- Select -> Design (closes the loop) -->
  <path d="M 198,268 C 255,200 350,158 432,146" fill="none" stroke="#6B7686" stroke-width="2.5" marker-end="url(#arrowHead)" />

  <text x="500" y="778" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12.5" fill="#545F70">next round: reseed the pool from coverage gaps and low-confidence guides</text>

  <!-- ================= DESIGN node (top) ================= -->
  <g transform="translate(500,110)">
    <rect x="-140" y="-42" width="280" height="84" rx="14" fill="#131A23" stroke="#2A3644" stroke-width="1.5" />
    <text x="0" y="-12" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="15" font-weight="700" fill="#FFFFFF">1 &#183; DESIGN</text>
    <text x="0" y="12" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#99A3B3">candidate pool: sequences,</text>
    <text x="0" y="28" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#99A3B3">molar ratios w_g, target spacing</text>
  </g>

  <!-- ================= BUILD node (upper right) ================= -->
  <g transform="translate(800,330)">
    <rect x="-140" y="-42" width="280" height="84" rx="14" fill="#131A23" stroke="#2A3644" stroke-width="1.5" />
    <text x="0" y="-12" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="15" font-weight="700" fill="#FFFFFF">2 &#183; BUILD</text>
    <text x="0" y="12" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#99A3B3">pooled depletion reactions:</text>
    <text x="0" y="28" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#99A3B3">reaction time, temp, RIN / DIN</text>
  </g>

  <!-- ================= ANALYZE node (lower right) ================= -->
  <g transform="translate(730,650)">
    <rect x="-140" y="-42" width="280" height="84" rx="14" fill="#131A23" stroke="#2A3644" stroke-width="1.5" />
    <text x="0" y="-12" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="15" font-weight="700" fill="#FFFFFF">3 &#183; ANALYZE</text>
    <text x="0" y="12" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#99A3B3">sequencing counts &#8594; labels:</text>
    <text x="0" y="28" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#99A3B3">efficacy y_g, off-target z_g</text>
  </g>

  <!-- ================= LEARN node (lower left, highlighted) ================= -->
  <g transform="translate(270,650)">
    <rect x="-155" y="-52" width="310" height="104" rx="14" fill="#0F2A24" stroke="#34D399" stroke-width="2" />
    <text x="0" y="-24" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="15" font-weight="700" fill="#FFFFFF">4 &#183; LEARN</text>
    <text x="0" y="-2" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#B8E6D2">shared trunk &#8594; efficacy head</text>
    <text x="0" y="14" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#B8E6D2">+ off-target head, per guide</text>
    <text x="0" y="34" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#34D399">&#8594; per-guide scores</text>
  </g>

  <!-- ================= SELECT node (upper left, highlighted) ================= -->
  <g transform="translate(175,320)">
    <rect x="-155" y="-52" width="310" height="104" rx="14" fill="#0F2A24" stroke="#34D399" stroke-width="2" />
    <text x="0" y="-24" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="15" font-weight="700" fill="#FFFFFF">5 &#183; SELECT</text>
    <text x="0" y="-2" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#B8E6D2">greedy submodular cover under</text>
    <text x="0" y="14" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="11" fill="#B8E6D2">coverage + off-target budget</text>
    <text x="0" y="34" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10.5" fill="#34D399">&#8594; minimal panel G&#8242;</text>
  </g>

  <!-- ================= focus bracket + label ================= -->
  <path d="M 44,228 C 18,228 18,712 44,712" fill="none" stroke="#34D399" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.6" />
  <text x="14" y="470" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#34D399" transform="rotate(-90 14 470)">THIS POST COVERS STAGES 4 &#8594; 5</text>

</svg>
